<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>慧渔先知 · Web 检测</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.6.0/fonts/remixicon.css" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <div class="bg-flow">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="orb orb-4"></div>
    <div class="wave-layer"></div>
  </div>

  <div class="app">
    <header class="header glass">
      <div class="brand">
        <div class="brand-icon">
          <i class="ri-radar-line"></i>
        </div>
        <div>
          <h1>慧渔先知</h1>
          <p>YOLO 水质智能检测 · 网页备用端</p>
        </div>
      </div>
      <div class="header-status" id="systemStatus">
        <span class="status-dot pulse"></span>
        <i class="ri-server-line"></i>
        <span>系统连接中...</span>
      </div>
    </header>

    <main class="main-grid">
      <!-- 左侧：上传与预览 -->
      <section class="panel glass">
        <div class="panel-head">
          <i class="ri-image-add-line"></i>
          <h2>图像检测</h2>
        </div>

        <div class="upload-zone" id="uploadZone">
          <input type="file" id="fileInput" accept="image/*" hidden />
          <div class="upload-inner" id="uploadPlaceholder">
            <div class="upload-icon-wrap">
              <i class="ri-upload-cloud-2-line"></i>
              <i class="ri-image-line sub-icon"></i>
            </div>
            <p class="upload-title">拖拽图片到此处，或点击上传</p>
            <p class="upload-hint">支持 JPG · PNG · WEBP · BMP</p>
            <button type="button" class="btn btn-primary" id="selectBtn">
              <i class="ri-folder-image-line"></i> 选择图片
            </button>
          </div>
          <div class="preview-wrap hidden" id="previewWrap">
            <img id="previewImg" alt="预览图" />
            <button type="button" class="btn-icon clear-btn" id="clearBtn" title="清除图片">
              <i class="ri-close-line"></i>
            </button>
          </div>
        </div>

        <div class="param-row">
          <label class="param-label">
            <i class="ri-temp-cold-line"></i> 水温 (℃)
          </label>
          <input type="text" id="tempInput" placeholder="可选，如 26.5" />
        </div>
        <div class="param-row">
          <label class="param-label">
            <i class="ri-flask-line"></i> pH 值
          </label>
          <input type="text" id="phInput" placeholder="可选，如 7.2" />
        </div>
        <div class="param-row">
          <label class="param-label">
            <i class="ri-water-percent-line"></i> 水位 (cm)
          </label>
          <input type="text" id="levelInput" placeholder="可选，如 120" />
        </div>

        <div class="confidence-block">
          <div class="confidence-head">
            <span><i class="ri-focus-3-line"></i> 置信度阈值</span>
            <strong id="confValue">0.50</strong>
          </div>
          <input type="range" id="confSlider" min="0.1" max="0.95" step="0.05" value="0.5" />
        </div>

        <button type="button" class="btn btn-detect" id="detectBtn" disabled>
          <i class="ri-scan-line"></i>
          <span>开始 AI 综合检测</span>
          <div class="btn-glow"></div>
        </button>
      </section>

      <!-- 中间：模型选择 -->
      <section class="panel glass">
        <div class="panel-head">
          <i class="ri-cpu-line"></i>
          <h2>YOLO 模型</h2>
          <button type="button" class="btn-text" id="toggleAllBtn">全选</button>
        </div>
        <div class="model-grid" id="modelGrid">
          <!-- 动态渲染 -->
        </div>
        <div class="model-legend">
          <span><i class="ri-checkbox-circle-fill ok"></i> 可用</span>
          <span><i class="ri-error-warning-fill warn"></i> 模型缺失</span>
        </div>
      </section>

      <!-- 右侧：结果 -->
      <section class="panel glass result-panel">
        <div class="panel-head">
          <i class="ri-bar-chart-box-line"></i>
          <h2>检测结果</h2>
        </div>

        <div class="result-image-wrap" id="resultImageWrap">
          <div class="result-placeholder" id="resultPlaceholder">
            <i class="ri-bubble-chart-line"></i>
            <p>检测完成后将在此显示标注图</p>
          </div>
          <img id="resultImg" class="hidden" alt="检测结果" />
        </div>

        <div class="result-cards" id="resultCards"></div>

        <div class="result-text glass-inner" id="resultText">
          <div class="empty-result">
            <i class="ri-lightbulb-flash-line"></i>
            <p>上传图片并选择模型后，点击检测即可查看结果</p>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <span><i class="ri-copyright-line"></i> 慧渔先知 FishAI · Web 拓展端</span>
      <span id="modelsDirHint"></span>
    </footer>
  </div>

  <div class="toast hidden" id="toast">
    <i class="ri-information-line"></i>
    <span id="toastMsg"></span>
  </div>

  <div class="loading-overlay hidden" id="loadingOverlay">
    <div class="loader">
      <div class="loader-ring"></div>
      <i class="ri-radar-line loader-icon"></i>
    </div>
    <p>AI 正在分析中，请稍候...</p>
  </div>

  <script src="/static/js/app.js"></script>
</body>
</html>
